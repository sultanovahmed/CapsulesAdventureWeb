<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | CapsulesAdventure</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">


    <style>
  body, html {
    margin: 0;
    padding: 0;
    overflow: hidden; /* чтобы не было скроллов */
    height: 100%;
    width: 100%;
  }
  #unityContainer {
    width: 100%;
    height: 100%;
    position: absolute;
  }
  canvas {
    width: 100% !important;
    height: 100% !important;
    display: block;
  }
</style>
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=2340 height=1080></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-webgl-logo"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">CapsulesAdventure</div>
      </div>
    </div>
    <script>
  var container = document.querySelector("#unity-container");
  var canvas = document.querySelector("#unity-canvas");
  var loadingBar = document.querySelector("#unity-loading-bar");
  var progressBarFull = document.querySelector("#unity-progress-bar-full");
  var fullscreenButton = document.querySelector("#unity-fullscreen-button");
  var warningBanner = document.querySelector("#unity-warning");

  function unityShowBanner(msg, type) {
    // твоя функция баннера без изменений
  }

  var buildUrl = "Build";
  var loaderUrl = buildUrl + "/WebGLBuilds.loader.js";
  var config = {
    dataUrl: buildUrl + "/WebGLBuilds.data",
    frameworkUrl: buildUrl + "/WebGLBuilds.framework.js",
    codeUrl: buildUrl + "/WebGLBuilds.wasm",
    streamingAssetsUrl: "StreamingAssets",
    companyName: "DefaultCompany",
    productName: "CapsulesAdventure",
    productVersion: "0.5",
    showBanner: unityShowBanner,
  };

  // Подгружаем loader.js
  var script = document.createElement("script");
  script.src = loaderUrl;
  script.onload = () => {
    createUnityInstance(canvas, config, (progress) => {
      progressBarFull.style.width = 100 * progress + "%";
    }).then((unityInstance) => {
      window.unityInstance = unityInstance;
      loadingBar.style.display = "none";

      // Обработчик fullscreen
      fullscreenButton.onclick = () => {
        unityInstance.SetFullscreen(1);
      };

      // Сразу подгоняем размер canvas
      function resizeCanvas() {
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
        unityInstance.Module.gl.viewport(0, 0, canvas.width, canvas.height);
      }

      // resize при изменении окна
      window.addEventListener("resize", resizeCanvas);
      resizeCanvas();
    }).catch((message) => {
      alert(message);
    });
  };
  document.body.appendChild(script);
</script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <title>Unity WebGL Player | CapsulesAdventure</title>
  <link rel="shortcut icon" href="TemplateData/favicon.ico">
  <link rel="stylesheet" href="TemplateData/style.css">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    #unity-container {
      width: 100%;
      height: 100%;
      position: absolute;
    }
    #unity-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
  </style>
</head>
<body>
  <div id="unity-container">
    <canvas id="unity-canvas" width="960" height="600"></canvas>
    <div id="unity-loading-bar">
      <div id="unity-logo"></div>
      <div id="unity-progress-bar-empty">
        <div id="unity-progress-bar-full"></div>
      </div>
    </div>
    <div id="unity-warning"></div>
    <div id="unity-footer">
      <div id="unity-webgl-logo"></div>
      <div id="unity-fullscreen-button"></div>
      <div id="unity-build-title">CapsulesAdventure</div>
    </div>
  </div>

  <script>
    const container = document.querySelector("#unity-container");
    const canvas = document.querySelector("#unity-canvas");
    const loadingBar = document.querySelector("#unity-loading-bar");
    const progressBarFull = document.querySelector("#unity-progress-bar-full");
    const fullscreenButton = document.querySelector("#unity-fullscreen-button");
    const warningBanner = document.querySelector("#unity-warning");

    function unityShowBanner(msg, type) {
      const div = document.createElement("div");
      div.innerHTML = msg;
      warningBanner.appendChild(div);
      if (type === "error") div.style = "background: red; padding: 10px;";
      else if (type === "warning") div.style = "background: yellow; padding: 10px;";
      if (type !== "error") setTimeout(() => { warningBanner.removeChild(div); }, 5000);
    }

    const buildUrl = "Build";
    const loaderUrl = buildUrl + "/WebGLBuilds.loader.js";
    const config = {
      dataUrl: buildUrl + "/WebGLBuilds.data",
      frameworkUrl: buildUrl + "/WebGLBuilds.framework.js",
      codeUrl: buildUrl + "/WebGLBuilds.wasm",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "DefaultCompany",
      productName: "CapsulesAdventure",
      productVersion: "0.5",
      showBanner: unityShowBanner,
    };

    // Загрузка Unity loader.js
    const script = document.createElement("script");
    script.src = loaderUrl;
    script.onload = () => {
      createUnityInstance(canvas, config, (progress) => {
        progressBarFull.style.width = 100 * progress + "%";
      }).then((unityInstance) => {
        window.unityInstance = unityInstance;
        loadingBar.style.display = "none";

        // Fullscreen
        fullscreenButton.onclick = () => unityInstance.SetFullscreen(1);

        // Resize canvas
        function resizeCanvas() {
          const ratio = window.devicePixelRatio || 1;
          canvas.width = container.clientWidth * ratio;
          canvas.height = container.clientHeight * ratio;
          if (unityInstance.Module && unityInstance.Module.gl) {
            unityInstance.Module.gl.viewport(0, 0, canvas.width, canvas.height);
          }
        }
        window.addEventListener("resize", resizeCanvas);
        resizeCanvas();
      }).catch((err) => alert(err));
    };
    document.body.appendChild(script);
  </script>
</body>
</html>
